name: Portfolio Review

on:
  schedule:
    # Run daily at 9 PM UTC (after US market close at 4 PM ET)
    - cron: '0 21 * * *'

  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: portfolio-review
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  review:
    name: Review Portfolio & Create Issues
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Only run on the main branch
    if: github.ref == 'refs/heads/main'

    environment: trading

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Restore persistent data
        uses: actions/cache@v5
        with:
          path: .data
          key: agent-data-${{ github.run_id }}
          restore-keys: |
            agent-data-

      - name: Run portfolio review
        id: review
        env:
          # Secrets
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # Configuration (reuses trading variables)
          ALPACA_BASE_URL: ${{ vars.ALPACA_BASE_URL || 'https://paper-api.alpaca.markets' }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-20250514' }}
          TRADING_MAX_POSITION_PCT: ${{ vars.TRADING_MAX_POSITION_PCT || '0.10' }}
          TRADING_MAX_DAILY_TRADES: ${{ vars.TRADING_MAX_DAILY_TRADES || '10' }}
          TRADING_STOP_LOSS_PCT: ${{ vars.TRADING_STOP_LOSS_PCT || '0.05' }}
          TRADING_TAKE_PROFIT_PCT: ${{ vars.TRADING_TAKE_PROFIT_PCT || '0.15' }}
          TRADING_MIN_CASH_RESERVE_PCT: ${{ vars.TRADING_MIN_CASH_RESERVE_PCT || '0.10' }}
          TRADING_WATCHLIST: ${{ vars.TRADING_WATCHLIST || 'AAPL,MSFT,GOOGL,AMZN,NVDA,META,TSLA,JPM,V,JNJ' }}
          TRADING_CRYPTO_WATCHLIST: ${{ vars.TRADING_CRYPTO_WATCHLIST || 'BTC/USD,ETH/USD,SOL/USD' }}
          TRADING_STRATEGY: ${{ vars.TRADING_STRATEGY || 'balanced' }}
          TRADING_DRY_RUN: 'true'  # Review agent never trades
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          GH_TOKEN: ${{ github.token }}
        run: python -m financial_agent.review_main

      - name: Save persistent data
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .data
          key: agent-data-${{ github.run_id }}

      - name: Post summary
        if: always()
        run: |
          echo "## Portfolio Review" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
