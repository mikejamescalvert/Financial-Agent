name: Daily Screener

on:
  schedule:
    # Run daily at 1 PM UTC (before US market open at 9:30 AM ET / 1:30 PM UTC)
    - cron: '0 13 * * 1-5'

  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: daily-screener
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  screen:
    name: Pre-Market Screen
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Only run on the main branch
    if: github.ref == 'refs/heads/main'

    environment: trading

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Restore persistent data
        uses: actions/cache@v5
        with:
          path: .data
          key: agent-data-${{ github.run_id }}
          restore-keys: |
            agent-data-

      - name: Run daily screener
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPACA_BASE_URL: ${{ vars.ALPACA_BASE_URL || 'https://paper-api.alpaca.markets' }}
          TRADING_WATCHLIST: ${{ vars.TRADING_WATCHLIST || 'AAPL,MSFT,GOOGL,AMZN,NVDA,META,TSLA,JPM,V,JNJ' }}
          TRADING_HISTORICAL_DAYS: ${{ vars.TRADING_HISTORICAL_DAYS || '270' }}
          TRADING_DRY_RUN: 'true'
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          GH_TOKEN: ${{ github.token }}
        run: python -m financial_agent.screener_main

      - name: Post summary
        if: always()
        run: |
          echo "## Daily Screener" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
