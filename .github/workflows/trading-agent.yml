name: Trading Agent

on:
  schedule:
    # Every 30 minutes, 24/7 — crypto trades around the clock,
    # stocks are filtered to market hours in the agent logic
    - cron: '*/30 * * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Override dry-run mode (leave empty to use TRADING_DRY_RUN variable)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - 'true'
          - 'false'
      strategy:
        description: 'Trading strategy override'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - 'balanced'
          - 'conservative'
          - 'momentum'

concurrency:
  group: trading-agent
  cancel-in-progress: false  # Never cancel a running trading cycle

permissions:
  contents: read

jobs:
  trade:
    name: Analyze & Trade
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Only run on the main branch
    if: github.ref == 'refs/heads/main'

    environment: trading

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Restore persistent data
        uses: actions/cache@v4
        with:
          path: .data
          key: agent-data-${{ github.run_id }}
          restore-keys: |
            agent-data-

      - name: Run trading agent
        id: agent
        env:
          # Secrets (from GitHub Secrets)
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # Configuration (from GitHub Variables)
          ALPACA_BASE_URL: ${{ vars.ALPACA_BASE_URL || 'https://paper-api.alpaca.markets' }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-20250514' }}
          TRADING_MAX_POSITION_PCT: ${{ vars.TRADING_MAX_POSITION_PCT || '0.10' }}
          TRADING_MAX_DAILY_TRADES: ${{ vars.TRADING_MAX_DAILY_TRADES || '10' }}
          TRADING_STOP_LOSS_PCT: ${{ vars.TRADING_STOP_LOSS_PCT || '0.05' }}
          TRADING_TAKE_PROFIT_PCT: ${{ vars.TRADING_TAKE_PROFIT_PCT || '0.15' }}
          TRADING_MIN_CASH_RESERVE_PCT: ${{ vars.TRADING_MIN_CASH_RESERVE_PCT || '0.10' }}
          TRADING_WATCHLIST: ${{ vars.TRADING_WATCHLIST || 'AAPL,MSFT,GOOGL,AMZN,NVDA,META,TSLA,JPM,V,JNJ' }}
          TRADING_CRYPTO_WATCHLIST: ${{ vars.TRADING_CRYPTO_WATCHLIST || 'BTC/USD,ETH/USD,SOL/USD' }}
          TRADING_STRATEGY: ${{ inputs.strategy || vars.TRADING_STRATEGY || 'balanced' }}
          TRADING_DRY_RUN: ${{ inputs.dry_run || vars.TRADING_DRY_RUN || 'false' }}
          TRADING_HISTORICAL_DAYS: ${{ vars.TRADING_HISTORICAL_DAYS || '270' }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}

          # Data provider keys (optional — features degrade gracefully without them)
          DATA_FMP_API_KEY: ${{ secrets.DATA_FMP_API_KEY || '' }}
          DATA_FINNHUB_API_KEY: ${{ secrets.DATA_FINNHUB_API_KEY || '' }}
          DATA_EARNINGS_BUFFER_DAYS: ${{ vars.DATA_EARNINGS_BUFFER_DAYS || '3' }}
          DATA_MAX_SECTOR_PCT: ${{ vars.DATA_MAX_SECTOR_PCT || '0.30' }}
          DATA_TRAILING_STOP_ATR_MULTIPLIER: ${{ vars.DATA_TRAILING_STOP_ATR_MULTIPLIER || '2.0' }}
          DATA_SLIPPAGE_TOLERANCE_PCT: ${{ vars.DATA_SLIPPAGE_TOLERANCE_PCT || '0.002' }}
          DATA_USE_LIMIT_ORDERS: ${{ vars.DATA_USE_LIMIT_ORDERS || 'true' }}
          DATA_ENABLE_POSITION_SCALING: ${{ vars.DATA_ENABLE_POSITION_SCALING || 'true' }}
          DATA_RISK_BUDGET_PCT: ${{ vars.DATA_RISK_BUDGET_PCT || '0.02' }}
        run: python -m financial_agent.main

      - name: Save persistent data
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .data
          key: agent-data-${{ github.run_id }}

      - name: Post failure summary
        if: failure()
        run: |
          echo "## Trading Agent Run — FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Strategy:** ${{ inputs.strategy || vars.TRADING_STRATEGY || 'balanced' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run:** ${{ inputs.dry_run || vars.TRADING_DRY_RUN || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The agent crashed before completing. Check the logs above for details." >> $GITHUB_STEP_SUMMARY
